{% extends "base.html" %}

{% block title %}
    EarthQuakeWatch - Registration
{% endblock %}

{% block body %}
<script type="text/javascript" src="{{ url_for('static', filename='js/auth/registration.js') }}" defer></script>
<div class="row d-flex justify-content-center align-items-center h-100">
    <div class="col-md-9 col-lg-6 col-xl-5">
        <img src="static/img/registration.webp"
            class="img-fluid" alt="Sample image">
    </div>
    <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
        <div class="text-center mb-5">
            <h2>Registration</h2>
        </div>
        <form id="registrationForm">
            <!-- Name input -->
            <div class="form-outline mb-4">
                <label class="form-label" for="name">First name:</label>
                <input type="text" id="name" name="name" class="form-control form-control-lg"
                    placeholder="First name" required />
            </div>

            <!-- Last Name input -->
            <div class="form-outline mb-4">
                <label class="form-label" for="lastname">Last name:</label>
                <input type="text" id="lastname" name="lastname" class="form-control form-control-lg"
                    placeholder="Last name" required />
            </div>

            <!-- Email input -->
            <div class="form-outline mb-4">
                <label class="form-label" for="email">Email address:</label>
                <input type="email" id="email" name="email" class="form-control form-control-lg"
                    placeholder="Email address" required />
            </div>

            <!-- Password input -->
            <div class="form-outline mb-3">
                <label class="form-label" for="password">Password:</label>
                <input type="password" id="password" name="password" class="form-control form-control-lg"
                    placeholder="Password" required autocomplete="password"/>
                    <i class="togglePassword"><img src="static/img/eye-hide.svg" alt="Icon eye-hide" width="25px" class="togglePasswordImg"></i>
            </div>

            <!-- Repeat Password input -->
            <div class="form-outline mb-3">
                <label class="form-label" for="passwordRepeat">Repeat password:</label>
                <input type="password" id="passwordRepeat" name="passwordRepeat" class="form-control form-control-lg"
                    placeholder="Repeat password" required autocomplete="passwordRepeat"/>
                <i class="togglePassword"><img src="static/img/eye-hide.svg" alt="Icon eye-hide" width="25px" class="togglePasswordImg"></i>
            </div>

            <!-- Submit button -->
            <div class="text-center text-lg-start mt-4 pt-2">
                <button type="submit" class="btn btn-primary" style="padding-left: 2.5rem; padding-right: 2.5rem;">
                    Register
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
